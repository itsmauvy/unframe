        <img src="images/logo.png" alt="UNFRAME" />
      </a>
      <div class="site-header-bottom">
        <nav class="nav nav-left">
          <div class="nav-item">
            <a href="board-list.html">ABOUT US</a>
            <div class="dropdown">
              <a href="brand-story.html">Brand Story</a>
              <a href="board-list.html">Board</a>
            </div>
          </div>
          <div class="nav-item">
            <a href="product-list.html">SHOP</a>
            <div class="dropdown">
              <a href="product-list.html#new">New Arrivals</a>
              <a href="product-list.html#best">Best Sellers</a>
              <a href="product-list.html#outerwear">Outerwear</a>
              <a href="product-list.html#tops">Tops</a>
              <a href="product-list.html#bottoms">Bottoms</a>
              <a href="product-list.html#accessories">Accessories</a>
              <a href="product-list.html#sale">Sale</a>
            </div>
          </div>
          <div class="nav-item"><a href="collection.html">COLLECTION</a><div class="dropdown"><a href="collection.html#25ss">25SS</a><a href="collection.html#25fw">25FW</a><a href="collection.html#collaboration">Collaboration</a><a href="collection.html#archive">Archive</a></div></div>

        <nav class="nav nav-icons" aria-label="Utility navigation">
          <a href="index.html" aria-label="Language"><img src="images/Globe.png" alt="" /></a>

          <a href="login.html" aria-label="Account"><img src="images/User.png" alt="" /></a>
        </nav>
      </div>
    </header>

    <main class="board-shell">
      <div class="board-head">
        <p>BOARD</p>
        <h1>WRITE</h1>
      </div>

      <form class="board-write-form" action="board-view.html">
        <label>
          <span>CATEGORY</span>
          <select>
            <option>NOTICE</option>
            <option>Q&amp;A</option>
            <option>FAQ</option>
          </select>
        </label>
        <label>
          <span>SUBJECT</span>
          <input type="text" />
        </label>
        <div class="board-write-grid">
          <label>
            <span>WRITER</span>
            <input type="text" />
          </label>
          <label>
            <span>PASSWORD</span>
            <input type="password" />
          </label>
        </div>
        <label>
          <span>CONTENT</span>
          <textarea rows="14"></textarea>
        </label>
        <label>
          <span>ATTACHMENT</span>
          <input type="file" />
        </label>
        <div class="board-write-actions">
          <a href="board-list.html">CANCEL</a>
          <button type="submit">SUBMIT</button>
        </div>
      </form>
    </main>
    <script src="search.js"></script>
  </body>
</html>
