  </head>
  <body class="inner-page checkout-page">
    <header class="site-header" aria-label="Main navigation">
      <a class="brand" href="index.html" aria-label="UNFRAME home">
        <img src="images/logo.png" alt="UNFRAME" />
      </a>
      <div class="site-header-bottom">
        <nav class="nav nav-left">
          <div class="nav-item"><a href="board-list.html">ABOUT US</a><div class="dropdown"><a href="brand-story.html">Brand Story</a><a href="board-list.html">Board</a></div></div>
          <div class="nav-item"><a href="product-list.html">SHOP</a><div class="dropdown"><a href="product-list.html#new">New Arrivals</a><a href="product-list.html#best">Best Sellers</a><a href="product-list.html#outerwear">Outerwear</a><a href="product-list.html#tops">Tops</a><a href="product-list.html#bottoms">Bottoms</a><a href="product-list.html#accessories">Accessories</a><a href="product-list.html#sale">Sale</a></div></div>
          <div class="nav-item"><a href="collection.html">COLLECTION</a><div class="dropdown"><a href="collection.html#25ss">25SS</a><a href="collection.html#25fw">25FW</a><a href="collection.html#collaboration">Collaboration</a><a href="collection.html#archive">Archive</a></div></div>
          <div class="nav-item"><a href="board-view.html">STORES</a><div class="dropdown"><a href="board-view.html">Seoul</a><a href="board-view.html">Japan</a><a href="index.html">Online</a></div></div>
        </nav>
        <nav class="nav nav-icons" aria-label="Utility navigation">
          <a href="index.html" aria-label="Language"><img src="images/Globe.png" alt="" /></a>
          <a href="search.html" aria-label="Search"><img src="images/Search.png" alt="" /></a>
          <a href="cart.html" aria-label="Cart"><img src="images/Shopping cart.png" alt="" /></a>
          <a href="login.html" aria-label="Account"><img src="images/User.png" alt="" /></a>
        </nav>
      </div>
    </header>

    <main class="checkout-shell">
      <div class="checkout-head">
        <p>ORDER</p>
        <h1>CHECKOUT</h1>
      </div>
      <form class="checkout-layout" action="index.html">
        <section class="checkout-panel">
          <h2>SHIPPING INFO</h2>
          <label>NAME<input type="text" /></label>
          <label>PHONE<input type="tel" /></label>
          <label>ADDRESS<input type="text" /></label>
          <label>DETAIL ADDRESS<input type="text" /></label>
          <label>MESSAGE<textarea rows="4"></textarea></label>
        </section>
        <aside class="checkout-summary">
          <h2>ORDER SUMMARY</h2>
          <div><span>UNFRAME FIELD JACKET</span><strong>KRW 188,000</strong></div>
          <div><span>STRUCTURED HALF SHIRT</span><strong>KRW 96,000</strong></div>
          <div><span>SHIPPING</span><strong>KRW 0</strong></div>
          <div class="checkout-total"><span>TOTAL</span><strong>KRW 284,000</strong></div>
          <button type="submit">PLACE ORDER</button>
        </aside>
      </form>
    </main>
  </body>
</html>
